name: Sync Google Scholar

on:
  schedule:
    - cron: '0 0 * * 4' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Fetch Scholar Data
        uses: 7ZBuO4wAAAAJ&hl=en
        with:
          scholar_id: 'YOUR_SCHOLAR_ID_HERE' # Ensure your ID is here!
          
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # This action saves the file specifically to data/scholar.json
          git add data/scholar.json
          git commit -m "Update Scholar citations" || exit 0
          git push
