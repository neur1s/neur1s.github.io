name: Convert CV to Markdown

on:
  push:
    paths:
      - 'Sofiya_CV.tex'
  workflow_dispatch: 

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: sudo apt-get install -y pandoc

      - name: Convert LaTeX to Markdown
        run: |
          # 1. Write the Jekyll Front Matter
          echo "---" > cv.md
          echo "layout: page" >> cv.md
          echo "title: Curriculum Vitae" >> cv.md
          echo "permalink: /cv/" >> cv.md
          echo "---" >> cv.md
          echo "" >> cv.md
          
          # 2. Add the opening container tag
          echo '<div style="max-width: 1000px; margin: 0 auto;">' >> cv.md
          echo "" >> cv.md
          
          # 3. Run your WORKING pandoc command
          pandoc Sofiya_CV.tex -f latex -t markdown_strict >> cv.md
          
          # 4. Add the closing container tag
          echo "" >> cv.md
          echo '</div>' >> cv.md

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add cv.md
          git commit -m "Auto-update CV with 1000px constraint" || exit 0
          git push
